# Reload config with r
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Alt+Space as prefix
unbind C-b
set -g prefix M-Space
bind M-Space send-prefix

# Terminal settings
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Mouse support
set -g mouse on

# Pane and window indexing
set -g base-index 1
setw -g pane-base-index 1

# Easy pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'rose-pine/tmux'

# Rosé Pine: Focused, fancy icons, minimal right-side info
set -g @rose_pine_variant 'main'
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'

# Fancy icons but clean layout
set -g @rose_pine_session_icon ''           # Fancy session icon
set -g @rose_pine_current_window_icon ''    # Fancy window icon
set -g @rose_pine_folder_icon ''            # Fancy folder icon
set -g @rose_pine_username_icon ''          # User icon
set -g @rose_pine_hostname_icon '󰒋'          # Host icon
set -g @rose_pine_window_status_separator "  "  # Window separator

# Minimal separators
set -g @rose_pine_left_separator ' '
set -g @rose_pine_field_separator ' '
set -g @rose_pine_window_separator ' '

# Minimal modules
set -g @rose_pine_only_windows 'on'                  # Only show window list on the left
set -g @rose_pine_disable_active_window_menu 'on'    # Disable left window menu clutter
set -g @rose_pine_show_current_program 'off'         # Hide program names for clean look
set -g @rose_pine_show_pane_directory 'off'          # Hide pane directory
set -g @rose_pine_user 'on'                          # Show user (left)
set -g @rose_pine_host 'on'                          # Show host (left)
set -g @rose_pine_date_time 'off'                    # No date/time on right

# Optional: responsive hide bar if needed
set -g @rose_pine_prioritize_windows 'on'
set -g @rose_pine_width_to_hide '80'
set -g @rose_pine_window_count '5'

# TPM initialization
run '~/.tmux/plugins/tpm/tpm'

